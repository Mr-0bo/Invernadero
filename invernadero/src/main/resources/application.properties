spring.application.name=invernadero
# Configuración de la conexión a MySQL (Puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/sistema_meteorologico_invernadero?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Mostrar las consultas SQL en la consola para depurar
spring.jpa.show-sql=true

# Validación de la base de datos (respeta el SCRIPT y los TRIGGERS existentes)
spring.jpa.hibernate.ddl-auto=validate

# Dialecto para optimizar las consultas a MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Obligar a Hibernate a respetar las mayúsculas y minúsculas exactas de las tablas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
